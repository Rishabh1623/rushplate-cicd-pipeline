<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RushPlate 🍽️ - Fast Food Delivery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f9f5f0; color: #333; }

    header {
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: white; padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 2rem; }
    header p { font-size: 0.95rem; opacity: 0.85; }
    .badge {
      background: rgba(255,255,255,0.2);
      padding: 6px 14px; border-radius: 20px; font-size: 0.8rem;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

    h2 { font-size: 1.4rem; margin-bottom: 16px; color: #c1121f; }

    .restaurants-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px; margin-bottom: 40px;
    }

    .card {
      background: white; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .card h3 { font-size: 1.15rem; margin-bottom: 4px; }
    .cuisine-tag {
      background: #fff3f3; color: #c1121f;
      padding: 3px 10px; border-radius: 20px; font-size: 0.75rem;
    }
    .card-meta { display: flex; gap: 16px; margin-top: 10px; font-size: 0.85rem; color: #666; }
    .rating { color: #f4a261; font-weight: bold; }

    .menu-list { margin-top: 14px; border-top: 1px solid #f0e0e0; padding-top: 12px; }
    .menu-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px dashed #f0e0e0; font-size: 0.88rem;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item-name { font-weight: 500; }
    .menu-item-desc { color: #888; font-size: 0.78rem; }
    .price { color: #c1121f; font-weight: bold; }

    .order-btn {
      margin-top: 4px; background: #e63946; color: white;
      border: none; padding: 4px 12px; border-radius: 6px;
      cursor: pointer; font-size: 0.8rem; transition: background 0.2s;
    }
    .order-btn:hover { background: #c1121f; }

    /* Orders Section */
    #orders-section { margin-top: 10px; }
    .order-card {
      background: white; border-radius: 10px; padding: 16px 20px;
      margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .order-info h4 { font-size: 1rem; margin-bottom: 4px; }
    .order-info p { font-size: 0.83rem; color: #666; }
    .status-badge {
      padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: bold;
    }
    .status-placed    { background: #fff3cd; color: #856404; }
    .status-preparing { background: #cff4fc; color: #055160; }
    .status-picked_up { background: #d1ecf1; color: #0c5460; }
    .status-delivered { background: #d4edda; color: #155724; }

    .empty-state { text-align: center; padding: 30px; color: #aaa; font-size: 0.95rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 30px; right: 30px;
      background: #2d6a4f; color: white; padding: 14px 22px;
      border-radius: 10px; font-size: 0.9rem; display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 999;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🍽️ RushPlate</h1>
    <p>Hot food, rushed to your plate - Order now!</p>
  </div>
  <div class="badge">⚡ Fast Delivery</div>
</header>

<div class="container">

  <!-- Restaurants -->
  <h2>🏪 Restaurants</h2>
  <div class="restaurants-grid" id="restaurants-grid">
    <p class="empty-state">Loading restaurants...</p>
  </div>

  <!-- Orders -->
  <h2>📦 Your Orders</h2>
  <div id="orders-section">
    <p class="empty-state" id="no-orders">No orders yet. Order something above!</p>
  </div>

</div>

<div id="toast"></div>

<script>
  const API = '';

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  async function loadRestaurants() {
    const res = await fetch(`${API}/restaurants`);
    const data = await res.json();
    const grid = document.getElementById('restaurants-grid');
    grid.innerHTML = '';

    data.forEach(r => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <h3>${r.name}</h3>
          <span class="cuisine-tag">${r.cuisine}</span>
        </div>
        <div class="card-meta">
          <span class="rating">⭐ ${r.rating}</span>
          <span>🕒 ${r.delivery_time}</span>
        </div>
        <div class="menu-list">
          ${r.menu.map(m => `
            <div class="menu-item">
              <div>
                <div class="menu-item-name">${m.name}</div>
                <div class="menu-item-desc">${m.description}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                <span class="price">$${m.price.toFixed(2)}</span>
                <button class="order-btn" onclick="placeOrder(${r.id}, ${m.id})">Order</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      grid.appendChild(card);
    });
  }

  async function placeOrder(restaurantId, menuItemId) {
    const body = {
      restaurant_id: restaurantId,
      items: [{ menu_item_id: menuItemId, quantity: 1 }],
      delivery_address: "123 Main St, Your City"
    };
    const res = await fetch(`${API}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      showToast('✅ Order placed successfully!');
      loadOrders();
    }
  }

  async function loadOrders() {
    const res = await fetch(`${API}/orders`);
    const data = await res.json();
    const section = document.getElementById('orders-section');
    const noOrders = document.getElementById('no-orders');

    if (data.length === 0) {
      noOrders.style.display = 'block';
      return;
    }
    noOrders.style.display = 'none';

    const existing = section.querySelectorAll('.order-card');
    existing.forEach(e => e.remove());

    data.reverse().forEach(o => {
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="order-info">
          <h4>Order #${o.id}</h4>
          <p>📍 ${o.delivery_address} · 💰 $${o.total.toFixed(2)}</p>
        </div>
        <span class="status-badge status-${o.status}">${o.status.replace('_', ' ').toUpperCase()}</span>
      `;
      section.appendChild(card);
    });
  }

  loadRestaurants();
  loadOrders();
</script>
</body>
</html>
